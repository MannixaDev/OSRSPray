<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSRS Prayer Guide</title>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a84b;
    --gold-light: #f0d078;
    --gold-dark: #8a6a1a;
    --brown-dark: #1a1008;
    --brown-mid: #2e1c08;
    --brown-panel: #3a2410;
    --brown-border: #6b4320;
    --parchment: #e8d5a0;
    --text-light: #f5e6c0;
    --text-dim: #b89a60;
    --melee: #e05030;
    --magic: #4080e0;
    --ranged: #50b840;
    --prayer-glow: #ffe87a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #0d0a06;
    background-image:
      radial-gradient(ellipse at 50% 0%, #2a1a06 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a84b' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
    color: var(--text-light);
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .title-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px #ffe87a88);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 10px #ffe87a66); }
    50% { filter: drop-shadow(0 0 22px #ffe87acc); }
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 20px #c8a84b88, 0 2px 4px #000;
    letter-spacing: 0.08em;
    line-height: 1.1;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    font-style: italic;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 320px;
    max-width: 100%;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold-dark), var(--gold), var(--gold-dark), transparent);
    margin: 16px auto;
    position: relative;
  }

  .divider::before {
    content: '⚔';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #0d0a06;
    padding: 0 10px;
    color: var(--gold);
    font-size: 1rem;
  }

  /* Monster selector */
  .selector-panel {
    background: linear-gradient(180deg, var(--brown-mid) 0%, var(--brown-dark) 100%);
    border: 2px solid var(--brown-border);
    border-radius: 6px;
    padding: 20px 24px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 4px 24px #00000088, inset 0 1px 0 #c8a84b44;
    margin-bottom: 24px;
  }

  .selector-label {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--brown-panel);
    border: 1px solid var(--brown-border);
    border-radius: 4px;
    color: var(--text-light);
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--gold-dark); }

  .search-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--brown-mid);
    border: 1px solid var(--brown-border);
    border-radius: 4px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px #00000099;
  }

  .search-dropdown.open { display: block; }

  .dropdown-item {
    padding: 9px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    color: var(--text-light);
    border-bottom: 1px solid #3a2410;
    transition: background 0.1s;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.focused { background: #5a3015; color: var(--gold-light); }

  .dropdown-item .d-icon { font-size: 1.1rem; width: 24px; text-align: center; }
  .dropdown-item .d-cat { font-size: 0.65rem; color: var(--text-dim); margin-left: auto; font-family: 'Cinzel', serif; letter-spacing: 0.08em; }

  .dropdown-empty { padding: 14px; color: var(--text-dim); font-style: italic; text-align: center; font-size: 0.88rem; }

  /* Prayer display */
  .prayer-panel {
    width: 100%;
    max-width: 600px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }

  .prayer-panel.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .monster-header {
    background: linear-gradient(180deg, var(--brown-mid) 0%, var(--brown-dark) 100%);
    border: 2px solid var(--brown-border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .monster-big-icon {
    font-size: 2.8rem;
    filter: drop-shadow(0 2px 6px #00000088);
  }

  .monster-title {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 10px #c8a84b66;
  }

  .monster-desc {
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 2px;
  }

  .attacks-container {
    background: var(--brown-dark);
    border: 2px solid var(--brown-border);
    border-radius: 0 0 6px 6px;
    overflow: hidden;
  }

  .attack-row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid #3a2410;
    transition: background 0.15s;
  }

  .attack-row:last-child { border-bottom: none; }
  .attack-row:hover { background: #2a1808; }

  .attack-type-badge {
    width: 90px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 8px;
    gap: 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .attack-type-badge .atk-icon { font-size: 1.6rem; }

  .badge-melee { background: linear-gradient(180deg, #3d1408 0%, #250d05 100%); color: #ff9070; border-right: 2px solid #8b2010; }
  .badge-magic { background: linear-gradient(180deg, #0a1840 0%, #060e28 100%); color: #80b0ff; border-right: 2px solid #1830a0; }
  .badge-ranged { background: linear-gradient(180deg, #0d2a08 0%, #081805 100%); color: #80e860; border-right: 2px solid #1a6010; }

  .attack-info {
    flex: 1;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .attack-name {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--text-light);
    margin-bottom: 3px;
  }

  .attack-detail {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .prayer-recommendation {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    padding: 14px 16px;
    min-width: 160px;
  }

  .prayer-label {
    font-size: 0.65rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .prayer-name {
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--prayer-glow);
    text-shadow: 0 0 8px #ffe87a88;
    text-align: right;
  }

  .prayer-icon {
    font-size: 1.2rem;
    margin-bottom: 2px;
  }

  .tip-box {
    background: linear-gradient(180deg, #1a2a10 0%, #101808 100%);
    border: 1px solid #3a5020;
    border-radius: 4px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 0.85rem;
    color: #90c870;
    font-style: italic;
    line-height: 1.5;
  }

  .tip-box strong {
    color: #b0e890;
    font-style: normal;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
  }

  .no-selection {
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
    padding: 32px 20px;
    background: var(--brown-dark);
    border: 2px solid var(--brown-border);
    border-radius: 0 0 6px 6px;
    font-size: 0.95rem;
  }

  .phase-tag {
    display: inline-block;
    background: #2a1a06;
    border: 1px solid var(--gold-dark);
    border-radius: 3px;
    font-size: 0.65rem;
    font-family: 'Cinzel', serif;
    color: var(--gold);
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.08em;
  }

  footer {
    margin-top: 48px;
    text-align: center;
    color: #4a3820;
    font-size: 0.78rem;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <span class="title-icon">🙏</span>
  <h1>OSRS Prayer Guide</h1>
  <p class="subtitle">Know what to pray — or perish.</p>
  <div class="divider"></div>
</header>

<div class="selector-panel">
  <span class="selector-label">Search Monster</span>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="e.g. Abyssal demon, Zulrah, Cerberus..." autocomplete="off" />
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
</div>

<div class="prayer-panel" id="prayerPanel">
  <div class="monster-header" id="monsterHeader"></div>
  <div class="attacks-container" id="attacksContainer"></div>
  <div id="tipBox"></div>
</div>

<footer>May Saradomin guide your prayers · Old School RuneScape</footer>

<script>
const PRAYERS = {
  PROTECT_MELEE:  { name: "Protect from Melee",    icon: "🗡️" },
  PROTECT_MAGIC:  { name: "Protect from Magic",    icon: "🔵" },
  PROTECT_RANGED: { name: "Protect from Missiles", icon: "🏹" },
  REDEMPTION:     { name: "Redemption",            icon: "💛" },
  NONE:           { name: "No Prayer Needed",      icon: "–"  },
};

const M = PRAYERS.PROTECT_MELEE;
const G = PRAYERS.PROTECT_MAGIC;
const R = PRAYERS.PROTECT_RANGED;
const N = PRAYERS.NONE;

const MONSTERS = [
  // ── Bosses ──────────────────────────────────────────────────────────────
  { id:"zulrah",    name:"Zulrah",              icon:"🐍", cat:"Boss",   desc:"Serpent of the shrine — rotates styles by phase", tip:"Learn the rotation. You'll mostly alternate between Magic and Ranged protection each phase.", attacks:[{type:"magic",icon:"🔵",name:"Toxic Venom Cloud",detail:"Green phase",prayer:G},{type:"ranged",icon:"🏹",name:"Ranged Serpentine",detail:"Red phase",prayer:R},{type:"melee",icon:"⚔️",name:"Melee Bite",detail:"Only if adjacent",prayer:M,phase:"Adjacent"}]},
  { id:"cerberus",  name:"Cerberus",            icon:"🐕", cat:"Boss",   desc:"Three-headed hellhound guardian of the River of Souls", tip:"Attacks in a fixed order: Magic → Ranged → Melee. Switch to Redemption when ghosts appear.", attacks:[{type:"magic",icon:"🔵",name:"Lava Breath",detail:"First in triple sequence",prayer:G},{type:"ranged",icon:"🏹",name:"Lightning Bolt",detail:"Second in sequence",prayer:R},{type:"melee",icon:"⚔️",name:"Triple Bite",detail:"Third in sequence",prayer:M,phase:"Cycle 3"}]},
  { id:"vorkath",   name:"Vorkath",             icon:"🐉", cat:"Boss",   desc:"Undead dragon of Ungael — rapid ranged dragonfire", tip:"Mostly Ranged. During Zombified Spawn switch to Melee and run figure-eight. Dodge acid pools.", attacks:[{type:"ranged",icon:"🏹",name:"Dragon Breath",detail:"Primary — rapid ranged",prayer:R},{type:"magic",icon:"🔵",name:"Venom/Ice Breath",detail:"Special breath attacks",prayer:G},{type:"melee",icon:"⚔️",name:"Zombified Spawn",detail:"Switch to Melee prayer",prayer:M,phase:"Special"}]},
  { id:"hydra",     name:"Alchemical Hydra",    icon:"🦎", cat:"Boss",   desc:"Slayer boss of Mount Karuulm — switches attack styles", tip:"Alternates Magic and Ranged every few attacks. Stand on vents. Switch prayer when it changes stance.", attacks:[{type:"magic",icon:"🔵",name:"Venom Spray",detail:"Magic phase",prayer:G},{type:"ranged",icon:"🏹",name:"Hydra Spittle",detail:"Ranged phase",prayer:R}]},
  { id:"nightmare", name:"The Nightmare",       icon:"🌙", cat:"Boss",   desc:"Ancient parasite in the Sisterhood Sanctuary", tip:"Uses all three styles. Watch animations carefully to switch prayer. She can put you to sleep.", attacks:[{type:"melee",icon:"⚔️",name:"Tendrils Swipe",detail:"Arm swing",prayer:M},{type:"magic",icon:"🔵",name:"Nightmare Bolt",detail:"Sparkling orb",prayer:G},{type:"ranged",icon:"🏹",name:"Curse Darts",detail:"Shadowy darts",prayer:R}]},
  { id:"corp",      name:"Corporeal Beast",     icon:"👁️", cat:"Boss",   desc:"Only melee weapons deal full damage", tip:"Pray Melee — it hits harder than the magic special. Use a spear.", attacks:[{type:"melee",icon:"⚔️",name:"Stomp / Swipe",detail:"Primary high damage",prayer:M},{type:"magic",icon:"🔵",name:"Dark Energy",detail:"Drains prayer & stats",prayer:G}]},
  { id:"kbd",       name:"King Black Dragon",   icon:"🐲", cat:"Boss",   desc:"Legendary three-headed dragon of the wilderness", tip:"Antifire pot + Protect from Magic fully negates magic dragonfire.", attacks:[{type:"magic",icon:"🔵",name:"Magic Dragonfire",detail:"Most common breath",prayer:G},{type:"ranged",icon:"🏹",name:"Ranged Dragonfire",detail:"Freezing/poison breath",prayer:R},{type:"melee",icon:"⚔️",name:"Claw Swipe",detail:"In melee range",prayer:M}]},
  { id:"bandos",    name:"General Graardor",    icon:"🪖", cat:"GWD",    desc:"Bandos's general — God Wars Dungeon", tip:"Pray Melee — his melee hits are far stronger than the ranged throws.", attacks:[{type:"melee",icon:"⚔️",name:"Stomp / Punch",detail:"Primary — very high damage",prayer:M},{type:"ranged",icon:"🏹",name:"Throwing Boulder",detail:"Less frequent",prayer:R}]},
  { id:"zammy",     name:"K'ril Tsutsaroth",    icon:"😈", cat:"GWD",    desc:"Zamorak's general — God Wars Dungeon", tip:"Always Protect from Melee — his melee drains your prayer on hit.", attacks:[{type:"melee",icon:"⚔️",name:"Godsword Slash",detail:"Primary — drains prayer",prayer:M},{type:"magic",icon:"🔵",name:"Demonic Blast",detail:"Occasional magic",prayer:G}]},
  { id:"saradomin", name:"Commander Zilyana",   icon:"⚔️", cat:"GWD",    desc:"Saradomin's champion — God Wars Dungeon", tip:"She's very fast. Protect from Magic and keep moving to avoid melee.", attacks:[{type:"magic",icon:"🔵",name:"Holy Bolt",detail:"Primary ranged strike",prayer:G},{type:"melee",icon:"⚔️",name:"Saradomin Sword",detail:"If she reaches you",prayer:M,phase:"Close"}]},
  { id:"kreearra",  name:"Kree'arra",           icon:"🦅", cat:"GWD",    desc:"Armadyl's champion — God Wars Dungeon", tip:"Primarily Ranged. Stay off melee range to avoid wing buffet.", attacks:[{type:"ranged",icon:"🏹",name:"Wind Wave",detail:"Primary attack",prayer:R},{type:"magic",icon:"🔵",name:"Arcane Blast",detail:"Alternate attack",prayer:G},{type:"melee",icon:"⚔️",name:"Wing Buffet",detail:"Only if adjacent",prayer:M,phase:"Adjacent"}]},
  { id:"nex",       name:"Nex",                 icon:"🧊", cat:"GWD",    desc:"Ancient Prison boss — four phases", tip:"Each phase has a different weakness. Pray Ranged during most phases; switch per mechanic.", attacks:[{type:"ranged",icon:"🏹",name:"Ice Barrage",detail:"Primary throughout",prayer:R},{type:"magic",icon:"🔵",name:"Smoke/Shadow/Blood/Ice",detail:"Phase special attacks",prayer:G},{type:"melee",icon:"⚔️",name:"Claw Swipe",detail:"In melee range",prayer:M,phase:"Close"}]},
  // Barrows
  { id:"ahrim",     name:"Ahrim the Blighted",  icon:"👻", cat:"Barrows", desc:"Mage brother — drains stats on hit", tip:"Magic only. High Magic defence gear recommended.", attacks:[{type:"magic",icon:"🔵",name:"Ahrim's Staff",detail:"Magic-only",prayer:G}]},
  { id:"karil",     name:"Karil the Tainted",   icon:"💀", cat:"Barrows", desc:"Ranger brother — drains Agility", tip:"Ranged only. Protect from Missiles the whole fight.", attacks:[{type:"ranged",icon:"🏹",name:"Karil's Crossbow",detail:"Ranged-only",prayer:R}]},
  { id:"dharok",    name:"Dharok the Wretched", icon:"🪓", cat:"Barrows", desc:"Melee brother — hits harder at low HP", tip:"Protect from Melee. Keep him high HP or he'll one-hit you.", attacks:[{type:"melee",icon:"⚔️",name:"Dharok's Greataxe",detail:"Harder at low HP",prayer:M}]},
  { id:"guthan",    name:"Guthan the Infested", icon:"🪱", cat:"Barrows", desc:"Melee brother — heals on hit", tip:"Protect from Melee. He heals himself so kill quickly.", attacks:[{type:"melee",icon:"⚔️",name:"Guthan's Warspear",detail:"Heals on hit",prayer:M}]},
  { id:"verac",     name:"Verac the Defiled",   icon:"🛡️", cat:"Barrows", desc:"Melee brother — can hit through prayer", tip:"Protect from Melee still reduces damage. His set effect can hit through prayer occasionally.", attacks:[{type:"melee",icon:"⚔️",name:"Verac's Flail",detail:"Can hit through prayer",prayer:M}]},
  { id:"torag",     name:"Torag the Corrupted", icon:"🔨", cat:"Barrows", desc:"Melee brother — drains run energy", tip:"Protect from Melee. Relatively straightforward fight.", attacks:[{type:"melee",icon:"⚔️",name:"Torag's Hammers",detail:"Drains run energy",prayer:M}]},
  // ToB
  { id:"maiden",    name:"The Maiden of Sugadinti", icon:"🩸", cat:"ToB", desc:"First boss of Theatre of Blood", tip:"Magic only. Kill Blood Spawns before they reach her or she heals.", attacks:[{type:"magic",icon:"🔵",name:"Blood Attack",detail:"Magic-only",prayer:G}]},
  { id:"bloat",     name:"Pestilent Bloat",     icon:"🪲", cat:"ToB",    desc:"Second boss of Theatre of Blood", tip:"Hide under it when it stops walking. Avoid falling flies.", attacks:[{type:"melee",icon:"⚔️",name:"Stomp",detail:"Melee stomp",prayer:M}]},
  { id:"nylocas",   name:"Nylocas Vasilias",    icon:"🕷️", cat:"ToB",   desc:"Third boss of Theatre of Blood — switches weaknesses", tip:"Switch protection prayer when it changes colour: white=Melee, blue=Magic, green=Ranged.", attacks:[{type:"melee",icon:"⚔️",name:"White Phase",detail:"Pray Melee when white",prayer:M},{type:"magic",icon:"🔵",name:"Blue Phase",detail:"Pray Magic when blue",prayer:G},{type:"ranged",icon:"🏹",name:"Green Phase",detail:"Pray Ranged when green",prayer:R}]},
  { id:"sotetseg",  name:"Sotetseg",            icon:"🎯", cat:"ToB",    desc:"Fourth boss of Theatre of Blood", tip:"Pray Melee. Dodge the red/black ball — if it hits you it's reflected to your partner.", attacks:[{type:"melee",icon:"⚔️",name:"Melee Swipe",detail:"Primary attack",prayer:M},{type:"magic",icon:"🔵",name:"Magic Ball",detail:"Redirect mechanic",prayer:G}]},
  { id:"xarpus",    name:"Xarpus",              icon:"🦇", cat:"ToB",    desc:"Fifth boss of Theatre of Blood", tip:"During exhumed phase focus on the skeletons. Final phase: watch his eyes to dodge the sweep.", attacks:[{type:"magic",icon:"🔵",name:"Acid Spray",detail:"Poison pools on ground",prayer:G},{type:"melee",icon:"⚔️",name:"Eye Sweep",detail:"Final phase rotation attack",prayer:M,phase:"Final"}]},
  { id:"verzik",    name:"Verzik Vitur",        icon:"👑", cat:"ToB",    desc:"Final boss of Theatre of Blood — three phases", tip:"P1: Melee. P2: Ranged primary, dodge green ball. P3: all three styles, watch carefully.", attacks:[{type:"melee",icon:"⚔️",name:"P1 Smash",detail:"Phase 1 only",prayer:M,phase:"P1"},{type:"ranged",icon:"🏹",name:"Web Bolt",detail:"Phase 2 primary",prayer:R,phase:"P2"},{type:"magic",icon:"🔵",name:"Green Orb",detail:"Explodes on player",prayer:G,phase:"P2-3"}]},
  // ToA
  { id:"akkha",     name:"Akkha",               icon:"👁️", cat:"ToA",   desc:"Tombs of Amascut — memory guardian", tip:"Pray opposite to his attack style. He telegraphs switches. Watch for shadow mechanics.", attacks:[{type:"melee",icon:"⚔️",name:"Melee Strike",detail:"Melee phase",prayer:M},{type:"magic",icon:"🔵",name:"Magic Bolt",detail:"Magic phase",prayer:G},{type:"ranged",icon:"🏹",name:"Ranged Shot",detail:"Ranged phase",prayer:R}]},

const typeLabels = { melee: "Melee", magic: "Magic", ranged: "Ranged" };

let focusedIndex = -1;
let filtered = [];

function buildDropdown(query) {
  const dd = document.getElementById("searchDropdown");
  query = query.trim().toLowerCase();
  filtered = query
    ? MONSTERS.filter(m => m.name.toLowerCase().includes(query) || m.cat.toLowerCase().includes(query))
    : MONSTERS;

  if (filtered.length === 0) {
    dd.innerHTML = `<div class="dropdown-empty">No monsters found</div>`;
  } else {
    dd.innerHTML = filtered.map((m, i) =>
      `<div class="dropdown-item" data-id="${m.id}" data-idx="${i}">
        <span class="d-icon">${m.icon}</span>
        <span>${m.name}</span>
        <span class="d-cat">${m.cat}</span>
      </div>`
    ).join("");
    dd.querySelectorAll(".dropdown-item").forEach(el => {
      el.addEventListener("mousedown", e => {
        e.preventDefault();
        selectMonster(el.dataset.id);
        closeDropdown();
      });
    });
  }
  focusedIndex = -1;
  dd.classList.add("open");
}

function closeDropdown() {
  document.getElementById("searchDropdown").classList.remove("open");
  focusedIndex = -1;
}

function moveFocus(dir) {
  const items = document.querySelectorAll(".dropdown-item");
  if (!items.length) return;
  items[focusedIndex]?.classList.remove("focused");
  focusedIndex = Math.max(0, Math.min(items.length - 1, focusedIndex + dir));
  items[focusedIndex].classList.add("focused");
  items[focusedIndex].scrollIntoView({ block: "nearest" });
}

document.getElementById("searchInput").addEventListener("input", e => buildDropdown(e.target.value));
document.getElementById("searchInput").addEventListener("focus", e => buildDropdown(e.target.value));
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "ArrowDown") { e.preventDefault(); moveFocus(1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); moveFocus(-1); }
  else if (e.key === "Enter") {
    const items = document.querySelectorAll(".dropdown-item");
    if (focusedIndex >= 0 && items[focusedIndex]) {
      selectMonster(items[focusedIndex].dataset.id);
      closeDropdown();
      document.getElementById("searchInput").blur();
    }
  }
  else if (e.key === "Escape") closeDropdown();
});
document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) closeDropdown();
});

function selectMonster(id) {
  const m = MONSTERS.find(x => x.id === id);
  if (!m) return;

  document.getElementById("searchInput").value = m.name;

  const panel = document.getElementById("prayerPanel");
  const header = document.getElementById("monsterHeader");
  const container = document.getElementById("attacksContainer");
  const tipBox = document.getElementById("tipBox");

  header.innerHTML = `
    <span class="monster-big-icon">${m.icon}</span>
    <div>
      <div class="monster-title">${m.name}</div>
      <div class="monster-desc">${m.desc}</div>
    </div>`;

  container.innerHTML = m.attacks.map(atk => `
    <div class="attack-row">
      <div class="attack-type-badge badge-${atk.type}">
        <span class="atk-icon">${atk.icon}</span>
        <span>${typeLabels[atk.type]}</span>
      </div>
      <div class="attack-info">
        <div class="attack-name">${atk.name}${atk.phase ? `<span class="phase-tag">${atk.phase}</span>` : ''}</div>
        <div class="attack-detail">${atk.detail}</div>
      </div>
      <div class="prayer-recommendation">
        <div class="prayer-label">Pray</div>
        <div class="prayer-icon">${atk.prayer.icon}</div>
        <div class="prayer-name">${atk.prayer.name}</div>
      </div>
    </div>`).join("");

  tipBox.innerHTML = m.tip ? `<div class="tip-box"><strong>📜 Tip:</strong> ${m.tip}</div>` : "";
  panel.classList.add("visible");
}
</script>
